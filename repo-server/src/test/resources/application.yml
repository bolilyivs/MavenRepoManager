micronaut:
  router:
    static-resources:
      swagger:
        paths: classpath:META-INF/swagger
        mapping: /swagger/**
      swagger-ui:
        paths: classpath:META-INF/swagger/views/swagger-ui
        mapping: /swagger-ui/**
  openapi:
    views:
      swagger-ui:
        enabled: true

datasources:
  default:
    password: ""
    url: jdbc:h2:mem:default;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    driver-class-name: org.h2.Driver
    schema-generate: none

jpa:
  default:
    properties:
      hibernate:
        hbm2ddl:
          auto: update
        show_sql: true           # Prints SQL to stdout
flyway:
  datasources:
    default:
      enabled: false
      locations:
        - classpath:databasemigrations
        - databasemigrations

logger:
  levels:
    root: ERROR
    io.micronaut: ERROR
    ru.bolilyivs: INFO
    org.flywaydb: DEBUG
    io.micronaut.flyway: DEBUG

app:
  cacheDir: "./cache/"
  rootRepoDir: "./repos/root/"