micronaut:
  router:
    static-resources:
      swagger:
        paths: classpath:META-INF/swagger
        mapping: /swagger/**
      swagger-ui:
        paths: classpath:META-INF/swagger/views/swagger-ui
        mapping: /swagger-ui/**
      repos:

        enabled: true
        mapping: "/repo/**"
        paths: "file:/home/shenlong/repos/"
  openapi:
    views:
      swagger-ui:
        enabled: true

datasources:
  default:
  password: ${JDBC_PASSWORD:""}
  url: ${JDBC_URL:`jdbc:h2:mem:default;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE`}
  username: ${JDBC_USER:sa}
  driver-class-name: ${JDBC_DRIVER:org.h2.Driver}

jpa:
  default:
    properties:
      hibernate:
        hbm2ddl:
          auto: update
        show_sql: true