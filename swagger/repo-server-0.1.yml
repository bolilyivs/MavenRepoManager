openapi: 3.0.1
info:
  title: Repo Server
  description: Менеджер репозиториев для артефактов Maven
  version: "0.1"
paths:
  /api/v1/repo:
    get:
      tags:
      - ManagerController
      operationId: list
      responses:
        "200":
          description: list 200 response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Repo"
    post:
      tags:
      - ManagerController
      operationId: create
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Repo"
        required: true
      responses:
        "200":
          description: create 200 response
  /api/v1/repo/{repoName}:
    get:
      tags:
      - ManagerController
      operationId: get
      parameters:
      - name: repoName
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: get 200 response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Repo"
    put:
      tags:
      - ManagerController
      operationId: update
      parameters:
      - name: repoName
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RepoUpdateDto"
        required: true
      responses:
        "200":
          description: update 200 response
    delete:
      tags:
      - ManagerController
      operationId: remove
      parameters:
      - name: repoName
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: remove 200 response
  /api/v1/repo/{repoName}/download/artefact:
    get:
      tags:
      - DownloadController
      operationId: artefact
      parameters:
      - name: repoName
        in: path
        required: true
        schema:
          type: string
      - name: dependecyString
        in: query
        required: true
        explode: false
        schema:
          type: string
      responses:
        "200":
          description: artefact 200 response
  /api/v1/repo/{repoName}/download/dependencies:
    get:
      tags:
      - DownloadController
      operationId: dependencies
      parameters:
      - name: repoName
        in: path
        required: true
        schema:
          type: string
      - name: dependecyString
        in: query
        required: true
        explode: false
        schema:
          type: string
      responses:
        "200":
          description: dependencies 200 response
  /api/v1/repo/{repoName}/upload/artefact:
    post:
      tags:
      - UploadController
      operationId: dependencies_1
      parameters:
      - name: repoName
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                dependecyString:
                  type: string
                file:
                  type: string
                  format: binary
            encoding:
              file:
                contentType: application/octet-stream
                explode: false
              dependecyString:
                contentType: application/octet-stream
                explode: false
        required: true
      responses:
        "200":
          description: dependencies_1 200 response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageDto"
  /api/v1/search/{repoName}/find/artefact:
    get:
      tags:
      - SearchController
      operationId: findArtefact
      parameters:
      - name: repoName
        in: path
        required: true
        schema:
          type: string
      - name: dependecyString
        in: query
        required: true
        explode: false
        schema:
          type: string
      responses:
        "200":
          description: findArtefact 200 response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DependencyDto_1"
  /api/v1/search/{repoName}/find/dependencies:
    get:
      tags:
      - SearchController
      operationId: findDependencies
      parameters:
      - name: repoName
        in: path
        required: true
        schema:
          type: string
      - name: dependecyString
        in: query
        required: true
        explode: false
        schema:
          type: string
      responses:
        "200":
          description: findDependencies 200 response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DependencyDto"
  /repo/{repoName}/{otherPath}:
    get:
      tags:
      - RepoController
      operationId: get_1
      parameters:
      - name: repoName
        in: path
        required: true
        schema:
          type: string
      - name: otherPath
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: get_1 200 response
          content:
            application/json:
              schema:
                type: string
                format: binary
components:
  schemas:
    ArtefactDto.ArtefactFileDto:
      type: object
      properties:
        filename:
          type: string
        type:
          type: string
        path:
          type: string
    DependencyDto:
      type: object
      properties:
        groupId:
          type: string
        artifactId:
          type: string
        version:
          type: string
        dependencies:
          type: array
          items:
            $ref: "#/components/schemas/DependencyDto"
      description: Зависимость
    DependencyDto_1:
      type: object
      properties:
        groupId:
          type: string
        artifactId:
          type: string
        version:
          type: string
        files:
          type: array
          items:
            $ref: "#/components/schemas/ArtefactDto.ArtefactFileDto"
      description: Зависимость
    MessageDto:
      type: object
      properties:
        message:
          type: string
      description: Сообщение
    Repo:
      type: object
      properties:
        name:
          type: string
          description: Название
          example: central
        url:
          type: string
          description: Адрес
          example: https://repo1.maven.org/maven2
        repoType:
          description: Тип репозитория
          example: REMOTE
          allOf:
          - $ref: "#/components/schemas/RepoType"
      description: Репозиторий
    RepoType:
      type: string
      description: Тип репозитория
      example: REMOTE
      enum:
      - REMOTE
      - LOCAL
    RepoUpdateDto:
      type: object
      properties:
        url:
          type: string
          description: Адрес
        repoType:
          description: Тип репозитория
          allOf:
          - $ref: "#/components/schemas/RepoType"
      description: Репозиторий
